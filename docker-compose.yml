services:
  postgres:
    image: postgres:16
    container_name: agentevalops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentevalops
      POSTGRES_PASSWORD: agentevalops
      POSTGRES_DB: agentevalops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentevalops -d agentevalops"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  redis:
    image: redis:7
    container_name: agentevalops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: agentevalops-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  qdrant_data: